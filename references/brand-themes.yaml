# 品牌主题预设（11 套）
# 每套主题包含：场景标签、配色方案、字体、图表偏好、信息密度倾向

themes:

  - id: consulting
    name: "咨询报告"
    tags: ["咨询", "战略", "董事会", "行业研究"]
    colors:
      primary: "#2B5797"      # 深蓝（主色）
      secondary: "#5B9BD5"    # 浅蓝（辅色）
      accent: "#ED7D31"       # 橙色（强调）
      neutral: ["#F2F2F2", "#D9D9D9", "#BFBFBF"]
      background: "#FFFFFF"
      text: "#333333"
      inverse: "#FFFFFF"
    fonts:
      heading: "Microsoft YaHei"
      body: "Microsoft YaHei"
    chart_preferences:
      strongly_preferred: ["bar", "column", "line", "waterfall"]
      preferred: ["area", "stacked_bar", "donut", "scatter"]
      neutral: ["radar", "bubble", "heatmap"]
      avoid: ["pie", "gauge"]
    density_preference: high
    scene_scores:
      pitch: 5
      consulting: 25
      tech_launch: 10
      policy: 20
      product: 10

